name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download chisel binaries (arm64, armv7, amd64)
        run: |
          set -eux
          mkdir -p android-app/app/src/main/jniLibs/arm64-v8a android-app/app/src/main/jniLibs/armeabi-v7a android-app/app/src/main/jniLibs/x86_64
          cd android-app/app/src/main/jniLibs
          CV=1.10.1
          # arm64
          curl -fsSL -o /tmp/chisel-arm64.gz "https://github.com/jpillora/chisel/releases/download/v${CV}/chisel_${CV}_linux_arm64.gz"
          gunzip -c /tmp/chisel-arm64.gz > arm64-v8a/libchisel.so
          chmod +x arm64-v8a/libchisel.so
          # armv7
          curl -fsSL -o /tmp/chisel-armv7.gz "https://github.com/jpillora/chisel/releases/download/v${CV}/chisel_${CV}_linux_armv7.gz"
          gunzip -c /tmp/chisel-armv7.gz > armeabi-v7a/libchisel.so
          chmod +x armeabi-v7a/libchisel.so
          # x86_64
          curl -fsSL -o /tmp/chisel-amd64.gz "https://github.com/jpillora/chisel/releases/download/v${CV}/chisel_${CV}_linux_amd64.gz"
          gunzip -c /tmp/chisel-amd64.gz > x86_64/libchisel.so
          chmod +x x86_64/libchisel.so
          ls -la arm64-v8a armeabi-v7a x86_64

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build debug APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename and prepare artifact
        run: |
          mkdir -p artifact
          cp android-app/app/build/outputs/apk/debug/app-debug.apk artifact/Royaltaxi-Tunnel.apk
          ls -la artifact/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royaltaxi-Tunnel-APK
          path: artifact/Royaltaxi-Tunnel.apk
          retention-days: 30

      - name: Create / update GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tunnel-latest
          name: "Royaltaxi Tunnel APK"
          body: |
            Eng so'nggi Royaltaxi Tunel APK — telefonga o'rnatish uchun.
            Build: ${{ github.sha }}
          files: artifact/Royaltaxi-Tunnel.apk
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
